services:
  - type: web
    name: quizblast
    runtime: node
    plan: free
    buildCommand: "cd client && npm install && npm run build && cd ../server && npm install && npx prisma generate"
    startCommand: "cd server && node index.js"
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: CLIENT_URL
        sync: false
